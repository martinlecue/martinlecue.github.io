<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-itunes-app" content="app-id=6788880047">
  <title>Dice Sheet — Rejoindre une partie</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      box-sizing: border-box;
    }
    .logo { font-size: 72px; margin-bottom: 12px; }
    h1 { font-size: 32px; margin: 0 0 12px; font-weight: 700; }
    p.subtitle {
      font-size: 17px; color: #6e6e73;
      margin: 0 0 24px; max-width: 360px; line-height: 1.4;
    }
    .room-code {
      background: white; border-radius: 16px;
      padding: 20px 32px; margin: 8px 0 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .room-code-label {
      font-size: 12px; color: #6e6e73;
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
    }
    .room-code-value {
      font-size: 44px; font-weight: 700;
      letter-spacing: 10px;
      font-family: "SF Mono", Menlo, Consolas, monospace;
    }
    .btn {
      display: inline-block; background: #5856d6; color: white;
      font-size: 17px; font-weight: 600;
      padding: 14px 36px; border-radius: 14px;
      text-decoration: none;
    }
    .hint {
      font-size: 13px; color: #6e6e73;
      margin-top: 20px; max-width: 320px;
    }
  </style>
</head>
<body>
  <div class="logo">🎲</div>
  <h1>Dice Sheet</h1>
  <p class="subtitle">Pour suivre cette partie en direct,<br>télécharge Dice Sheet sur l'App Store.</p>

  <div class="room-code" id="roomCodeCard" style="display:none;">
    <div class="room-code-label">Code de la salle</div>
    <div class="room-code-value" id="roomCodeValue"></div>
  </div>

  <a href="https://apps.apple.com/app/id6788880047" class="btn">Télécharger sur l'App Store</a>

  <p class="hint">Après l'installation, ouvre l'app et tape « Rejoindre une partie ».</p>

  <script>
    const params = new URLSearchParams(window.location.search);
    const room = params.get('room');
    if (room && /^\d{5}$/.test(room)) {
      document.getElementById('roomCodeCard').style.display = 'block';
      document.getElementById('roomCodeValue').textContent = room;
    }
  </script>
</body>
</html>
